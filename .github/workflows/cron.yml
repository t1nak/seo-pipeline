name: seo-pipeline

# Twice-weekly run plus manual dispatch. Active only after the repo is pushed
# to a GitHub remote and the required secrets are configured.
on:
  schedule:
    - cron: '0 7 * * 1,4'  # Mon + Thu 07:00 UTC
  workflow_dispatch:

concurrency:
  group: seo-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GSC_SERVICE_ACCOUNT_JSON_PATH: ${{ github.workspace }}/gsc-sa.json
    steps:
      - uses: actions/checkout@v4

      - name: Materialise GSC service account credentials
        env:
          SA_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "${SA_JSON}" ]; then
            echo "GSC_SERVICE_ACCOUNT_JSON secret is empty; GSC jobs will log warnings but the pipeline continues."
            exit 0
          fi
          printf '%s' "${SA_JSON}" > "${GSC_SERVICE_ACCOUNT_JSON_PATH}"
          chmod 600 "${GSC_SERVICE_ACCOUNT_JSON_PATH}"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run pipeline
        id: pipeline
        run: uv run python -m seo_pipeline.run run all

      - name: Clean up credentials
        if: always()
        run: rm -f "${GSC_SERVICE_ACCOUNT_JSON_PATH}"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[seo-pipeline] Run failed on ${new Date().toISOString().slice(0,10)}`;
            const body = [
              "The scheduled seo-pipeline run failed.",
              "",
              `Workflow: ${context.workflow}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Check the Run log table on the dashboard for the per-job status.",
              "Common causes: GSC quota exceeded, Cloudflare blocking Googlebot (check `redirect_health` alerts), database reachability.",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["seo-pipeline", "cron-failure"],
            });
