name: Pipeline (full)

# Voller Pipeline-Lauf inklusive Brief-Step (Claude API).
# Manuell ausgeloest, ANTHROPIC_API_KEY-Secret erforderlich.
# Erwartete Kosten pro Lauf: ~0.50 bis 2 EUR (7 Cluster, Sonnet, mit
# Prompt-Caching). dry_run=true testet die Verkabelung ohne API-Aufruf.
#
# Warum kein push-Trigger: Brief-Step kostet Geld, jeder Lauf soll eine
# bewusste Entscheidung sein. dry_run=true testet die Verkabelung ohne API-Aufruf.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Test-Modus: kein LLM-Call, Stubs schreiben (kostenlos, gut für Verkabelungs-Test)"
        type: boolean
        default: false
      brief_provider:
        description: "Brief-Provider (LLM für Content-Briefings) — api: Anthropic, openai: GPT-5. max (Agent SDK) ist lokal-only und in CI nicht verfügbar."
        type: choice
        options:
          - api
          - openai
        default: api
      model:
        description: "Modell-ID überschreiben (leer = Default je Provider: api -> claude-sonnet-4-6, openai -> gpt-5). Nur relevant wenn dry_run=false."
        type: string
        default: ""
      enrich_provider:
        description: "Enrich-Provider (Suchvolumen, Difficulty) — estimate: Heuristik kostenlos, dataforseo: ~0.75 USD pro 500 Keywords"
        type: choice
        options:
          - estimate
          - dataforseo
        default: estimate
      max_keywords:
        description: "Cap der Keyword-Anzahl nach Discover"
        type: choice
        options:
          - "100"
          - "250"
          - "500"
          - "1000"
        default: "500"
      cluster_mcs:
        description: "HDBSCAN min_cluster_size (kleiner -> mehr Cluster). Default 15 (kombiniert mit method=leaf -> 12 Cluster), siehe Methodik."
        type: choice
        options:
          - "8"
          - "10"
          - "12"
          - "15"
          - "20"
        default: "15"
      cluster_method:
        description: "HDBSCAN cluster_selection_method. eom = wenige stabile Cluster, leaf = mehr feinere Cluster. Default leaf (mit mcs=15 -> 12 Cluster)."
        type: choice
        options:
          - eom
          - leaf
        default: leaf

permissions:
  contents: write

concurrency:
  group: pipeline-full
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify provider secret
        if: ${{ !inputs.dry_run }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRIEF_PROVIDER: ${{ inputs.brief_provider }}
        run: |
          if [ "$BRIEF_PROVIDER" = "api" ]; then
            if [ -z "$ANTHROPIC_API_KEY" ]; then
              echo "::error::ANTHROPIC_API_KEY secret missing for --brief-provider api."
              echo "Add it under Settings -> Secrets and variables -> Actions, or use dry_run=true."
              exit 1
            fi
            echo "ANTHROPIC_API_KEY present (length: ${#ANTHROPIC_API_KEY})"
          elif [ "$BRIEF_PROVIDER" = "openai" ]; then
            if [ -z "$OPENAI_API_KEY" ]; then
              echo "::error::OPENAI_API_KEY secret missing for --brief-provider openai."
              echo "Add it under Settings -> Secrets and variables -> Actions, or use dry_run=true."
              exit 1
            fi
            echo "OPENAI_API_KEY present (length: ${#OPENAI_API_KEY})"
          fi

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch/sentence_transformers
          key: st-${{ runner.os }}-paraphrase-multilingual-MiniLM-L12-v2

      - name: Step 1 -- Discover keywords
        env:
          PIPELINE_DISCOVER_MAX_KEYWORDS: ${{ inputs.max_keywords }}
        run: python pipeline.py --step discover

      - name: Step 2 -- Enrich (Search Volume, Keyword Difficulty)
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          PIPELINE_ENRICH_PROVIDER: ${{ inputs.enrich_provider }}
        run: python pipeline.py --step enrich

      - name: Step 3 -- Cluster keywords
        env:
          PIPELINE_CLUSTER_HDBSCAN_MCS: ${{ inputs.cluster_mcs }}
          PIPELINE_CLUSTER_HDBSCAN_METHOD: ${{ inputs.cluster_method }}
        run: python pipeline.py --step cluster

      - name: Step 3b -- Generate cluster labels (LLM)
        if: ${{ !inputs.dry_run }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.labels_llm

      - name: Step 4 -- Generate content briefs (LLM)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PIPELINE_BRIEF_PROVIDER: ${{ inputs.brief_provider }}
          PIPELINE_BRIEF_MODEL: ${{ inputs.model }}
        run: python pipeline.py --step brief ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Step 5 -- Build report
        run: python pipeline.py --step report

      - name: Show run summary
        run: |
          echo "=== Cluster profiles ==="
          head -n 12 output/clustering/cluster_profiles.csv
          echo ""
          echo "=== Briefings ==="
          ls -1 output/briefings/ | sort
          echo ""
          echo "=== Brief sample (cluster_01.md, first 10 lines) ==="
          head -n 10 output/briefings/cluster_01.md || true
          echo ""
          echo "=== Report KPIs ==="
          grep -E '"label"|"value"' output/reporting/index.html | head -n 12 || true

      - name: Upload pipeline outputs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-full-output
          path: |
            data/keywords.csv
            output/clustering/
            output/briefings/
            output/reporting/
          retention-days: 14
          if-no-files-found: error

      - name: Commit pipeline output back to main
        # Output ins Repo committen, damit GitHub Pages den frischen Lauf
        # zeigt (Dashboard, Charts, Cluster Map, Briefs). Der Push triggert
        # docs.yml fuer das Pages-Deployment. pipeline.yml hat einen
        # paths-Filter ohne output/, wird also nicht erneut ausgeloest.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/keywords.csv output/clustering/ output/briefings/ output/reporting/
          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi
          git commit -m "ci(pipeline-full): update output from run ${{ github.run_id }} (provider=${{ inputs.brief_provider }}, mcs=${{ inputs.cluster_mcs }}/${{ inputs.cluster_method }}, n=${{ inputs.max_keywords }})"
          git push
