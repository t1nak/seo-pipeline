# Cluster labels keyed by 0-based HDBSCAN cluster ID.
# -1 is the noise / outlier class.
#
# Edit this file to rename clusters without touching Python code.
# Any cluster ID not listed here falls back to "Cluster N" automatically,
# so runs with non-default mcs values never raise a KeyError.
#
# After a material keyword change, re-run the sweep, inspect the new
# cluster profiles, and update the labels here.

