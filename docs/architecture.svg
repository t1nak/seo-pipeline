<svg width="100%" viewBox="0 0 1000 980" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>zvoove SEO Keyword Pipeline: Architektur</title>
  <desc>Fünf Schritte der Pipeline (discover, enrich, cluster, brief, report), externe APIs, Datenartefakte und Validierungs-Metriken.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ca3af"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#f3f4f6"/>
    </linearGradient>
  </defs>

  <!-- Outer background -->
  <rect width="1000" height="980" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="48" font-size="22" font-weight="700" fill="#111827">zvoove SEO Keyword Pipeline</text>
  <text x="40" y="72" font-size="13" fill="#6b7280">Fünf entkoppelte Schritte. Jeder Schritt einzeln testbar und re-runnbar. Lokale ML, Anthropic API für Briefs.</text>

  <!-- Column headers -->
  <text x="120" y="110" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1.5">EXTERN</text>
  <text x="490" y="110" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1.5" text-anchor="middle">PIPELINE</text>
  <text x="870" y="110" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1.5" text-anchor="middle">ARTEFAKTE</text>

  <!-- ========== STEP 1: DISCOVER ========== -->
  <!-- External: zvoove blog -->
  <g filter="url(#shadow)">
    <rect x="40" y="135" width="180" height="60" rx="10" fill="#fae8ff" stroke="#c026d3" stroke-width="0.8"/>
    <text x="58" y="158" font-size="13" font-weight="600" fill="#7e22ce">zvoove.de/wissen/blog</text>
    <text x="58" y="178" font-size="11" fill="#a855f7">Live Web (Scraping TODO)</text>
  </g>
  <line x1="220" y1="165" x2="305" y2="165" stroke="#c026d3" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Step box: discover.py -->
  <g filter="url(#shadow)">
    <rect x="305" y="135" width="370" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
    <circle cx="335" cy="165" r="14" fill="#2563eb"/>
    <text x="335" y="170" font-size="12" font-weight="700" fill="white" text-anchor="middle">1</text>
    <text x="362" y="158" font-size="14" font-weight="600" fill="#1e40af">discover.py</text>
    <text x="362" y="180" font-size="11" fill="#3b82f6">Blog crawl ▸ Seed Keywords (max 500)</text>
    <text x="660" y="180" font-size="10" fill="#94a3b8" text-anchor="end">STUB · --source manual</text>
  </g>
  <line x1="675" y1="165" x2="755" y2="165" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Artifact: keywords.csv -->
  <g filter="url(#shadow)">
    <rect x="755" y="140" width="205" height="50" rx="6" fill="white" stroke="#2563eb" stroke-width="0.8"/>
    <text x="767" y="158" font-size="12" font-weight="600" fill="#1e40af" font-family="ui-monospace, SFMono-Regular, monospace">data/keywords.csv</text>
    <text x="767" y="178" font-size="10" fill="#6b7280">500 Zeilen · keyword, intent, type</text>
  </g>

  <!-- Down arrow to step 2 -->
  <line x1="490" y1="195" x2="490" y2="225" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== STEP 2: ENRICH ========== -->
  <!-- External: DataForSEO -->
  <g filter="url(#shadow)">
    <rect x="40" y="225" width="180" height="60" rx="10" fill="#fae8ff" stroke="#c026d3" stroke-width="0.8"/>
    <text x="58" y="248" font-size="13" font-weight="600" fill="#7e22ce">DataForSEO Labs</text>
    <text x="58" y="268" font-size="11" fill="#a855f7">SV · KD · CPC (optional)</text>
  </g>
  <line x1="220" y1="255" x2="305" y2="255" stroke="#c026d3" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Step box: enrich.py -->
  <g filter="url(#shadow)">
    <rect x="305" y="225" width="370" height="60" rx="10" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
    <circle cx="335" cy="255" r="14" fill="#ea580c"/>
    <text x="335" y="260" font-size="12" font-weight="700" fill="white" text-anchor="middle">2</text>
    <text x="362" y="248" font-size="14" font-weight="600" fill="#9a3412">enrich.py</text>
    <text x="362" y="270" font-size="11" fill="#c2410c">SV · KD · CPC · SERP · Priority Score</text>
    <text x="660" y="270" font-size="10" fill="#94a3b8" text-anchor="end">heuristik | dataforseo</text>
  </g>
  <line x1="675" y1="255" x2="755" y2="255" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Artifact: enriched keywords.csv -->
  <g filter="url(#shadow)">
    <rect x="755" y="230" width="205" height="50" rx="6" fill="white" stroke="#ea580c" stroke-width="0.8"/>
    <text x="767" y="248" font-size="12" font-weight="600" fill="#9a3412" font-family="ui-monospace, SFMono-Regular, monospace">data/keywords.csv</text>
    <text x="767" y="268" font-size="10" fill="#6b7280">+ search_volume, kd, cpc_eur, ...</text>
  </g>

  <line x1="490" y1="285" x2="490" y2="315" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== STEP 3: CLUSTER (largest, 8 sub-steps) ========== -->
  <g filter="url(#shadow)">
    <rect x="305" y="315" width="370" height="280" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
    <circle cx="335" cy="343" r="14" fill="#059669"/>
    <text x="335" y="348" font-size="12" font-weight="700" fill="white" text-anchor="middle">3</text>
    <text x="362" y="338" font-size="14" font-weight="600" fill="#065f46">cluster.py · cluster_viz.py</text>
    <text x="362" y="358" font-size="10" fill="#10b981">Lokale ML · Reproduzierbar mit random_state=42</text>

    <!-- Sub-steps -->
    <g font-size="11" fill="#047857">
      <text x="324" y="385" font-weight="600">3a</text><text x="362" y="385">clean</text>
      <text x="540" y="385" fill="#6b7280" font-size="10">drop dupes, coerce numerics</text>

      <text x="324" y="405" font-weight="600">3b</text><text x="362" y="405">embed</text>
      <text x="540" y="405" fill="#6b7280" font-size="10">MiniLM-L12 multilingual · 384D</text>

      <text x="324" y="425" font-weight="600">3c</text><text x="362" y="425">reduce</text>
      <text x="540" y="425" fill="#6b7280" font-size="10">UMAP · 5D (cluster) + 2D (viz)</text>

      <text x="324" y="445" font-weight="600">3d</text><text x="362" y="445">cluster</text>
      <text x="540" y="445" fill="#6b7280" font-size="10">HDBSCAN · mcs=15, ms=5, eom</text>

      <text x="324" y="465" font-weight="600">3e</text><text x="362" y="465">label</text>
      <text x="540" y="465" fill="#6b7280" font-size="10">DE + EN labels manuell kuratiert</text>

      <text x="324" y="485" font-weight="600">3f</text><text x="362" y="485">profile</text>
      <text x="540" y="485" fill="#6b7280" font-size="10">SV, KD, CPC, intent mix pro Cluster</text>

      <text x="324" y="505" font-weight="600">3g</text><text x="362" y="505">charts</text>
      <text x="540" y="505" fill="#6b7280" font-size="10">matplotlib · 6 PNGs</text>

      <text x="324" y="525" font-weight="600">3h</text><text x="362" y="525">viz</text>
      <text x="540" y="525" fill="#6b7280" font-size="10">Plotly · bilinguale interaktive Karte</text>
    </g>

    <!-- Diagnostic step (separate from main flow) -->
    <line x1="320" y1="540" x2="660" y2="540" stroke="#10b981" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.4"/>
    <text x="324" y="558" font-size="10" font-weight="600" fill="#10b981">DIAGNOSTIK</text>
    <text x="324" y="575" font-size="11" fill="#047857">--step sweep</text>
    <text x="540" y="575" fill="#6b7280" font-size="10">24 HDBSCAN Konfigurationen, Tabelle</text>
  </g>

  <!-- Cluster artifacts (multiple boxes on the right) -->
  <g filter="url(#shadow)">
    <rect x="755" y="320" width="205" height="50" rx="6" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="767" y="338" font-size="12" font-weight="600" fill="#065f46" font-family="ui-monospace, SFMono-Regular, monospace">embeddings.npy</text>
    <text x="767" y="358" font-size="10" fill="#6b7280">500 × 384 float32</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="755" y="378" width="205" height="50" rx="6" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="767" y="396" font-size="12" font-weight="600" fill="#065f46" font-family="ui-monospace, SFMono-Regular, monospace">umap_5d.npy + umap_2d.npy</text>
    <text x="767" y="416" font-size="10" fill="#6b7280">UMAP Projektionen</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="755" y="436" width="205" height="50" rx="6" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="767" y="454" font-size="12" font-weight="600" fill="#065f46" font-family="ui-monospace, SFMono-Regular, monospace">cluster_profiles.csv</text>
    <text x="767" y="474" font-size="10" fill="#6b7280">14 Zeilen · Stats pro Cluster</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="755" y="494" width="205" height="50" rx="6" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="767" y="512" font-size="12" font-weight="600" fill="#065f46" font-family="ui-monospace, SFMono-Regular, monospace">chart1-6 *.png</text>
    <text x="767" y="532" font-size="10" fill="#6b7280">6 statische Diagnose Charts</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="755" y="552" width="205" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="767" y="570" font-size="12" font-weight="700" fill="#92400e" font-family="ui-monospace, SFMono-Regular, monospace">cluster_map.html ★</text>
    <text x="767" y="588" font-size="10" fill="#92400e">interaktiv · DE/EN · live deployed</text>
  </g>

  <!-- Connector arrows from step 3 box to artifacts -->
  <line x1="675" y1="345" x2="755" y2="345" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="675" y1="403" x2="755" y2="403" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="675" y1="461" x2="755" y2="461" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="675" y1="519" x2="755" y2="519" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="675" y1="577" x2="755" y2="577" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.7"/>

  <line x1="490" y1="595" x2="490" y2="625" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== STEP 4: BRIEF ========== -->
  <!-- External: Anthropic API -->
  <g filter="url(#shadow)">
    <rect x="40" y="625" width="180" height="60" rx="10" fill="#fae8ff" stroke="#c026d3" stroke-width="0.8"/>
    <text x="58" y="648" font-size="13" font-weight="600" fill="#7e22ce">Anthropic API</text>
    <text x="58" y="668" font-size="11" fill="#a855f7">claude-sonnet-4-6 · Caching</text>
  </g>
  <line x1="220" y1="655" x2="305" y2="655" stroke="#c026d3" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- Step box: brief.py -->
  <g filter="url(#shadow)">
    <rect x="305" y="625" width="370" height="60" rx="10" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
    <circle cx="335" cy="655" r="14" fill="#9333ea"/>
    <text x="335" y="660" font-size="12" font-weight="700" fill="white" text-anchor="middle">4</text>
    <text x="362" y="648" font-size="14" font-weight="600" fill="#6b21a8">brief.py</text>
    <text x="362" y="670" font-size="11" fill="#a855f7">System Prompt cached · pro Cluster ein Brief</text>
    <text x="660" y="670" font-size="10" fill="#94a3b8" text-anchor="end">--dry-run optional</text>
  </g>
  <line x1="675" y1="655" x2="755" y2="655" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Artifact: 13 briefs -->
  <g filter="url(#shadow)">
    <rect x="755" y="630" width="205" height="50" rx="6" fill="white" stroke="#9333ea" stroke-width="0.8"/>
    <text x="767" y="648" font-size="12" font-weight="600" fill="#6b21a8" font-family="ui-monospace, SFMono-Regular, monospace">briefings/cluster_NN.md ×13</text>
    <text x="767" y="668" font-size="10" fill="#6b7280">vollständige Content Briefs (DE)</text>
  </g>

  <line x1="490" y1="685" x2="490" y2="715" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== STEP 5: REPORT ========== -->
  <g filter="url(#shadow)">
    <rect x="305" y="715" width="370" height="60" rx="10" fill="#f3f4f6" stroke="#4b5563" stroke-width="1"/>
    <circle cx="335" cy="745" r="14" fill="#4b5563"/>
    <text x="335" y="750" font-size="12" font-weight="700" fill="white" text-anchor="middle">5</text>
    <text x="362" y="738" font-size="14" font-weight="600" fill="#1f2937">report.py</text>
    <text x="362" y="760" font-size="11" fill="#6b7280">KPIs · Cluster Tabelle · Charts · Brief Links</text>
  </g>
  <line x1="675" y1="745" x2="755" y2="745" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Artifact: report -->
  <g filter="url(#shadow)">
    <rect x="755" y="720" width="205" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="767" y="738" font-size="12" font-weight="700" fill="#92400e" font-family="ui-monospace, SFMono-Regular, monospace">reporting/index.html ★</text>
    <text x="767" y="758" font-size="10" fill="#92400e">konsolidiertes Dashboard · live</text>
  </g>

  <!-- ========== ORCHESTRATOR ========== -->
  <line x1="490" y1="775" x2="490" y2="805" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="305" y="805" width="370" height="42" rx="8" fill="#1f2937"/>
    <text x="490" y="830" font-size="12" font-weight="600" fill="white" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace">python pipeline.py [--step ...] [--source ...] [--dry-run]</text>
  </g>

  <!-- ========== VALIDATION FOOTER ========== -->
  <g>
    <rect x="40" y="875" width="920" height="80" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <text x="60" y="900" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1.2">VALIDIERUNG · MANUELLER BASELINE LAUF</text>

    <!-- 5 KPI cells -->
    <g font-size="11" fill="#374151">
      <text x="60" y="930" font-size="20" font-weight="700" fill="#111827">500</text>
      <text x="60" y="948" fill="#6b7280">Keywords</text>

      <text x="180" y="930" font-size="20" font-weight="700" fill="#111827">10</text>
      <text x="180" y="948" fill="#6b7280">Cluster + 38 Ausreißer</text>

      <text x="380" y="930" font-size="20" font-weight="700" fill="#059669">0,67</text>
      <text x="380" y="948" fill="#6b7280">Silhouette (ohne Rauschen)</text>

      <text x="580" y="930" font-size="20" font-weight="700" fill="#2563eb">0,54</text>
      <text x="580" y="948" fill="#6b7280">ARI vs Ward(k=10)</text>

      <text x="760" y="930" font-size="20" font-weight="700" fill="#f59e0b">~25 s</text>
      <text x="760" y="948" fill="#6b7280">voller Lauf ohne Briefs</text>
    </g>
  </g>

  <!-- Legend (top-right) -->
  <g transform="translate(800,40)">
    <text x="0" y="0" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="1">LEGENDE</text>
    <rect x="0" y="10" width="14" height="10" rx="2" fill="#fae8ff" stroke="#c026d3" stroke-width="0.8"/>
    <text x="20" y="19" font-size="10" fill="#6b7280">externes System</text>
    <rect x="0" y="26" width="14" height="10" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="0.8"/>
    <text x="20" y="35" font-size="10" fill="#6b7280">Pipeline Schritt</text>
    <rect x="0" y="42" width="14" height="10" rx="2" fill="white" stroke="#9ca3af" stroke-width="0.8"/>
    <text x="20" y="51" font-size="10" fill="#6b7280">Datenartefakt</text>
    <rect x="0" y="58" width="14" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="20" y="67" font-size="10" fill="#6b7280">live deployed</text>
  </g>
</svg>
