<svg width="100%" viewBox="0 0 1100 1140" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>zvoove SEO Keyword Pipeline: Architektur</title>
  <desc>Vier modulare Phasen, in fünf entkoppelten Skripten implementiert (discover, enrich, cluster, brief, report), externe Provider-Optionen, Datenartefakte und Validierungs-Metriken.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ca3af"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfd"/>
      <stop offset="1" stop-color="#f3f4f6"/>
    </linearGradient>
  </defs>

  <!-- Outer background -->
  <rect width="1100" height="1140" fill="url(#bg)"/>

  <!-- Title -->
  <text x="40" y="48" font-size="22" font-weight="700" fill="#111827">zvoove SEO Keyword Pipeline</text>
  <text x="40" y="72" font-size="13" fill="#6b7280">Vier modulare Phasen, in fünf entkoppelten Skripten. Provider an jeder externen Stelle austauschbar. Lokale ML, LLM API für Briefs.</text>

  <!-- Column headers -->
  <text x="130" y="115" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1.5" text-anchor="middle">EXTERN · OPTIONEN</text>
  <text x="540" y="115" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1.5" text-anchor="middle">PIPELINE</text>
  <text x="970" y="115" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1.5" text-anchor="middle">ARTEFAKTE</text>

  <!-- ========== STEP 1: DISCOVER ========== -->
  <!-- External: Keyword sources -->
  <g filter="url(#shadow)">
    <rect x="40" y="135" width="180" height="100" rx="10" fill="#fae8ff" stroke="#c026d3" stroke-width="0.8"/>
    <text x="50" y="155" font-size="12" font-weight="700" fill="#7e22ce">Keyword-Quellen</text>
    <line x1="50" y1="163" x2="210" y2="163" stroke="#c026d3" stroke-width="0.5" opacity="0.4"/>
    <text x="50" y="182" font-size="10" fill="#7e22ce">• Manual CSV</text>
    <text x="50" y="200" font-size="10" fill="#a855f7">• zvoove Blog</text>
    <text x="50" y="218" font-size="10" fill="#a855f7">• SEMrush · LLM-Set · etc.</text>
  </g>
  <line x1="220" y1="185" x2="355" y2="185" stroke="#c026d3" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Step box: discover.py -->
  <g filter="url(#shadow)">
    <rect x="355" y="155" width="370" height="60" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
    <circle cx="385" cy="185" r="14" fill="#2563eb"/>
    <text x="385" y="190" font-size="12" font-weight="700" fill="white" text-anchor="middle">1</text>
    <text x="412" y="178" font-size="14" font-weight="600" fill="#1e40af">discover.py</text>
    <text x="412" y="200" font-size="11" fill="#3b82f6">Seed Keywords · max 500 · --source manual|live</text>
  </g>
  <line x1="725" y1="185" x2="850" y2="185" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Artifact: keywords.csv -->
  <g filter="url(#shadow)">
    <rect x="850" y="160" width="220" height="50" rx="6" fill="white" stroke="#2563eb" stroke-width="0.8"/>
    <text x="862" y="178" font-size="12" font-weight="600" fill="#1e40af" font-family="ui-monospace, SFMono-Regular, monospace">data/keywords.csv</text>
    <text x="862" y="198" font-size="10" fill="#6b7280">500 Zeilen · keyword, intent, type</text>
  </g>

  <!-- Down arrow to step 2 -->
  <line x1="540" y1="215" x2="540" y2="255" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== STEP 2: ENRICH ========== -->
  <!-- External: Enrichment providers -->
  <g filter="url(#shadow)">
    <rect x="40" y="255" width="180" height="100" rx="10" fill="#fae8ff" stroke="#c026d3" stroke-width="0.8"/>
    <text x="50" y="275" font-size="12" font-weight="700" fill="#7e22ce">Enrichment-Provider</text>
    <line x1="50" y1="283" x2="210" y2="283" stroke="#c026d3" stroke-width="0.5" opacity="0.4"/>
    <text x="50" y="302" font-size="10" fill="#7e22ce">• Heuristik</text>
    <text x="50" y="320" font-size="10" fill="#a855f7">• DataForSEO Labs</text>
    <text x="50" y="338" font-size="10" fill="#a855f7">• SEMrush · Ahrefs · etc.</text>
  </g>
  <line x1="220" y1="305" x2="355" y2="305" stroke="#c026d3" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- Step box: enrich.py -->
  <g filter="url(#shadow)">
    <rect x="355" y="275" width="370" height="60" rx="10" fill="#fed7aa" stroke="#ea580c" stroke-width="1"/>
    <circle cx="385" cy="305" r="14" fill="#ea580c"/>
    <text x="385" y="310" font-size="12" font-weight="700" fill="white" text-anchor="middle">2</text>
    <text x="412" y="298" font-size="14" font-weight="600" fill="#9a3412">enrich.py</text>
    <text x="412" y="320" font-size="11" fill="#c2410c">SV · KD · CPC · SERP · Priority Score</text>
  </g>
  <line x1="725" y1="305" x2="850" y2="305" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Artifact: enriched keywords.csv -->
  <g filter="url(#shadow)">
    <rect x="850" y="280" width="220" height="50" rx="6" fill="white" stroke="#ea580c" stroke-width="0.8"/>
    <text x="862" y="298" font-size="12" font-weight="600" fill="#9a3412" font-family="ui-monospace, SFMono-Regular, monospace">data/keywords.csv</text>
    <text x="862" y="318" font-size="10" fill="#6b7280">+ search_volume, kd, cpc_eur, ...</text>
  </g>

  <line x1="540" y1="355" x2="540" y2="395" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== STEP 3: CLUSTER (largest, 8 sub-steps) ========== -->
  <g filter="url(#shadow)">
    <rect x="355" y="395" width="370" height="280" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
    <circle cx="385" cy="423" r="14" fill="#059669"/>
    <text x="385" y="428" font-size="12" font-weight="700" fill="white" text-anchor="middle">3</text>
    <text x="412" y="418" font-size="14" font-weight="600" fill="#065f46">cluster.py · cluster_viz.py</text>
    <text x="412" y="438" font-size="10" fill="#10b981">Lokale ML · Reproduzierbar mit random_state=42</text>

    <!-- Sub-steps -->
    <g font-size="11" fill="#047857">
      <text x="374" y="465" font-weight="600">3a</text><text x="412" y="465">clean</text>
      <text x="590" y="465" fill="#6b7280" font-size="10">drop dupes, coerce numerics</text>

      <text x="374" y="485" font-weight="600">3b</text><text x="412" y="485">embed</text>
      <text x="590" y="485" fill="#6b7280" font-size="10">MiniLM-L12 multilingual · 384D</text>

      <text x="374" y="505" font-weight="600">3c</text><text x="412" y="505">reduce</text>
      <text x="590" y="505" fill="#6b7280" font-size="10">UMAP · 5D (cluster) + 2D (viz)</text>

      <text x="374" y="525" font-weight="600">3d</text><text x="412" y="525">cluster</text>
      <text x="590" y="525" fill="#6b7280" font-size="10">HDBSCAN · mcs=12, ms=5, eom</text>

      <text x="374" y="545" font-weight="600">3e</text><text x="412" y="545">label</text>
      <text x="590" y="545" fill="#6b7280" font-size="10">DE + EN labels manuell kuratiert</text>

      <text x="374" y="565" font-weight="600">3f</text><text x="412" y="565">profile</text>
      <text x="590" y="565" fill="#6b7280" font-size="10">SV, KD, CPC, intent mix pro Cluster</text>

      <text x="374" y="585" font-weight="600">3g</text><text x="412" y="585">charts</text>
      <text x="590" y="585" fill="#6b7280" font-size="10">matplotlib · 6 PNGs</text>

      <text x="374" y="605" font-weight="600">3h</text><text x="412" y="605">viz</text>
      <text x="590" y="605" fill="#6b7280" font-size="10">Plotly · bilinguale interaktive Karte</text>
    </g>

    <!-- Diagnostic step (separate from main flow) -->
    <line x1="370" y1="620" x2="710" y2="620" stroke="#10b981" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.4"/>
    <text x="374" y="638" font-size="10" font-weight="600" fill="#10b981">DIAGNOSTIK</text>
    <text x="374" y="655" font-size="11" fill="#047857">--step sweep</text>
    <text x="590" y="655" fill="#6b7280" font-size="10">24 HDBSCAN Konfigurationen, Tabelle</text>
  </g>

  <!-- Cluster artifacts (multiple boxes on the right) -->
  <g filter="url(#shadow)">
    <rect x="850" y="400" width="220" height="50" rx="6" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="862" y="418" font-size="12" font-weight="600" fill="#065f46" font-family="ui-monospace, SFMono-Regular, monospace">embeddings.npy</text>
    <text x="862" y="438" font-size="10" fill="#6b7280">500 × 384 float32</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="850" y="458" width="220" height="50" rx="6" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="862" y="476" font-size="12" font-weight="600" fill="#065f46" font-family="ui-monospace, SFMono-Regular, monospace">umap_5d.npy + umap_2d.npy</text>
    <text x="862" y="496" font-size="10" fill="#6b7280">UMAP Projektionen</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="850" y="516" width="220" height="50" rx="6" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="862" y="534" font-size="12" font-weight="600" fill="#065f46" font-family="ui-monospace, SFMono-Regular, monospace">cluster_profiles.csv</text>
    <text x="862" y="554" font-size="10" fill="#6b7280">14 Zeilen · Stats pro Cluster</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="850" y="574" width="220" height="50" rx="6" fill="white" stroke="#059669" stroke-width="0.8"/>
    <text x="862" y="592" font-size="12" font-weight="600" fill="#065f46" font-family="ui-monospace, SFMono-Regular, monospace">chart1-6 *.png</text>
    <text x="862" y="612" font-size="10" fill="#6b7280">6 statische Diagnose Charts</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="850" y="632" width="220" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="862" y="650" font-size="12" font-weight="700" fill="#92400e" font-family="ui-monospace, SFMono-Regular, monospace">cluster_map.html ★</text>
    <text x="862" y="668" font-size="10" fill="#92400e">interaktiv · DE/EN · live deployed</text>
  </g>

  <!-- Connector arrows from step 3 box to artifacts -->
  <line x1="725" y1="425" x2="850" y2="425" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="725" y1="483" x2="850" y2="483" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="725" y1="541" x2="850" y2="541" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="725" y1="599" x2="850" y2="599" stroke="#9ca3af" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <line x1="725" y1="657" x2="850" y2="657" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.7"/>

  <line x1="540" y1="675" x2="540" y2="715" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== STEP 4: BRIEF ========== -->
  <!-- External: Brief providers -->
  <g filter="url(#shadow)">
    <rect x="40" y="715" width="180" height="100" rx="10" fill="#fae8ff" stroke="#c026d3" stroke-width="0.8"/>
    <text x="50" y="735" font-size="12" font-weight="700" fill="#7e22ce">LLM-Provider</text>
    <line x1="50" y1="743" x2="210" y2="743" stroke="#c026d3" stroke-width="0.5" opacity="0.4"/>
    <text x="50" y="762" font-size="10" fill="#7e22ce">• Anthropic API · sonnet-4-6</text>
    <text x="50" y="780" font-size="10" fill="#a855f7">• OpenAI · gpt-5</text>
    <text x="50" y="798" font-size="10" fill="#a855f7">• Agent SDK · Claude Code, lokal</text>
  </g>
  <line x1="220" y1="745" x2="355" y2="745" stroke="#c026d3" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>

  <!-- Step box: brief.py -->
  <g filter="url(#shadow)">
    <rect x="355" y="735" width="370" height="60" rx="10" fill="#e9d5ff" stroke="#9333ea" stroke-width="1"/>
    <circle cx="385" cy="765" r="14" fill="#9333ea"/>
    <text x="385" y="770" font-size="12" font-weight="700" fill="white" text-anchor="middle">4</text>
    <text x="412" y="758" font-size="14" font-weight="600" fill="#6b21a8">brief.py</text>
    <text x="412" y="780" font-size="11" fill="#a855f7">System Prompt cached · pro Cluster ein Brief · --dry-run für Stubs</text>
  </g>
  <line x1="725" y1="765" x2="850" y2="765" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Artifact: 10 briefs -->
  <g filter="url(#shadow)">
    <rect x="850" y="740" width="220" height="50" rx="6" fill="white" stroke="#9333ea" stroke-width="0.8"/>
    <text x="862" y="758" font-size="12" font-weight="600" fill="#6b21a8" font-family="ui-monospace, SFMono-Regular, monospace">briefings/cluster_NN.md ×10</text>
    <text x="862" y="778" font-size="10" fill="#6b7280">vollständige Content Briefs (DE)</text>
  </g>

  <line x1="540" y1="815" x2="540" y2="845" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== STEP 5: REPORT ========== -->
  <g filter="url(#shadow)">
    <rect x="355" y="845" width="370" height="60" rx="10" fill="#f3f4f6" stroke="#4b5563" stroke-width="1"/>
    <circle cx="385" cy="875" r="14" fill="#4b5563"/>
    <text x="385" y="880" font-size="12" font-weight="700" fill="white" text-anchor="middle">5</text>
    <text x="412" y="868" font-size="14" font-weight="600" fill="#1f2937">report.py</text>
    <text x="412" y="890" font-size="11" fill="#6b7280">KPIs · Cluster Tabelle · Charts · Brief Links</text>
  </g>
  <line x1="725" y1="875" x2="850" y2="875" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Artifact: report -->
  <g filter="url(#shadow)">
    <rect x="850" y="850" width="220" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="862" y="868" font-size="12" font-weight="700" fill="#92400e" font-family="ui-monospace, SFMono-Regular, monospace">reporting/index.html ★</text>
    <text x="862" y="888" font-size="10" fill="#92400e">konsolidiertes Dashboard · live</text>
  </g>

  <!-- ========== ORCHESTRATOR ========== -->
  <line x1="540" y1="905" x2="540" y2="935" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <rect x="355" y="935" width="370" height="42" rx="8" fill="#1f2937"/>
    <text x="540" y="960" font-size="12" font-weight="600" fill="white" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace">python pipeline.py [--step ...] [--source ...] [--dry-run]</text>
  </g>

  <!-- ========== VALIDATION FOOTER ========== -->
  <g>
    <rect x="40" y="1000" width="1030" height="80" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
    <text x="60" y="1025" font-size="11" font-weight="600" fill="#9ca3af" letter-spacing="1.2">VALIDIERUNG · MANUELLER BASELINE LAUF</text>

    <!-- 5 KPI cells -->
    <g font-size="11" fill="#374151">
      <text x="60" y="1055" font-size="20" font-weight="700" fill="#111827">500</text>
      <text x="60" y="1073" fill="#6b7280">Keywords</text>

      <text x="200" y="1055" font-size="20" font-weight="700" fill="#111827">10</text>
      <text x="200" y="1073" fill="#6b7280">Cluster + 40 Ausreißer</text>

      <text x="430" y="1055" font-size="20" font-weight="700" fill="#059669">0,67</text>
      <text x="430" y="1073" fill="#6b7280">Silhouette (ohne Rauschen)</text>

      <text x="650" y="1055" font-size="20" font-weight="700" fill="#2563eb">0,57</text>
      <text x="650" y="1073" fill="#6b7280">ARI vs Ward(k=10)</text>

      <text x="850" y="1055" font-size="20" font-weight="700" fill="#f59e0b">~25 s</text>
      <text x="850" y="1073" fill="#6b7280">voller Lauf ohne Briefs</text>
    </g>
  </g>

  <!-- Legend (bottom row, full width) -->
  <g transform="translate(40,1100)">
    <text x="0" y="12" font-size="10" font-weight="600" fill="#9ca3af" letter-spacing="1.2">LEGENDE</text>
    <rect x="80" y="3" width="14" height="10" rx="2" fill="#fae8ff" stroke="#c026d3" stroke-width="0.8"/>
    <text x="100" y="12" font-size="10" fill="#6b7280">externer Provider</text>
    <rect x="220" y="3" width="14" height="10" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="0.8"/>
    <text x="240" y="12" font-size="10" fill="#6b7280">Pipeline-Schritt</text>
    <rect x="360" y="3" width="14" height="10" rx="2" fill="white" stroke="#9ca3af" stroke-width="0.8"/>
    <text x="380" y="12" font-size="10" fill="#6b7280">Datenartefakt</text>
    <rect x="490" y="3" width="14" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="510" y="12" font-size="10" fill="#6b7280">live deployed (★)</text>
    <text x="650" y="12" font-size="10" fill="#7e22ce">heute aktive Option</text>
    <text x="800" y="12" font-size="10" fill="#a855f7">weitere Provider-Optionen</text>
  </g>
</svg>
