<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Cluster 1: teal, top-left -->
  <circle cx="8"  cy="9"  r="3"   fill="#2dd4bf"/>
  <circle cx="13" cy="7"  r="3"   fill="#2dd4bf"/>
  <circle cx="10" cy="14" r="2.5" fill="#2dd4bf" opacity="0.75"/>

  <!-- Cluster 2: teal, bottom-right -->
  <circle cx="22" cy="23" r="3"   fill="#2dd4bf"/>
  <circle cx="27" cy="21" r="3"   fill="#2dd4bf"/>
  <circle cx="25" cy="27" r="2.5" fill="#2dd4bf" opacity="0.75"/>

  <!-- Cluster 3: amber, top-right -->
  <circle cx="25" cy="9"  r="3"   fill="#f59e0b"/>
  <circle cx="28" cy="14" r="2.5" fill="#f59e0b" opacity="0.8"/>

  <!-- Noise: two faint grey dots in the gap -->
  <circle cx="16" cy="19" r="1.8" fill="#94a3b8" opacity="0.45"/>
  <circle cx="19" cy="16" r="1.4" fill="#94a3b8" opacity="0.3"/>
