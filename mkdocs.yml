site_name: SEO Keyword Pipeline für zvoove
site_url: https://t1nak.github.io/seo-pipeline/
site_description: Case Study Bewerbung Revenue AI Architect, zvoove
site_author: Tina Koziol
repo_url: https://github.com/t1nak/seo-pipeline
repo_name: t1nak/seo-pipeline
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  favicon: assets/cluster_overview.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Dark Mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Light Mode
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/sitemap

nav:
  - Übersicht: index.md
  - Dokumentation:
    - Case Study: case-study.md
    - Prozessarchitektur: architecture.md
    - Methodik:
      - methodology.md
      - Entscheidungen: decisions.md
    - Ergebnisse: results.md
    - Technical Review: technical_review.md
  - Live Demo:
    - Cluster Karte: https://t1nak.github.io/seo-pipeline/output/clustering/cluster_map.html
    - Reporting: https://t1nak.github.io/seo-pipeline/output/reporting/index.html
    - Cluster Briefs: https://t1nak.github.io/seo-pipeline/output/briefings/index.html
  - GitHub: https://github.com/t1nak/seo-pipeline

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

plugins:
  - search:
      lang:
        - de
        - en
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: de
          default: true
          name: Deutsch
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Übersicht: Overview
            Dokumentation: Documentation
            Case Study: Case Study
            Prozessarchitektur: Process Architecture
            Methodik: Methodology
            Entscheidungen: Decisions
            Ergebnisse: Results
            Technical Review: Technical Review
            Live Demo: Live Demo
            Cluster Karte: Cluster Map
            Reporting: Reporting
            Cluster Briefs: Cluster Briefs

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/t1nak/seo-pipeline
  generator: false

extra_css:
  - stylesheets/extra.css

copyright: Tina Koziol, Case Study für eine Bewerbung als Revenue AI Architect
